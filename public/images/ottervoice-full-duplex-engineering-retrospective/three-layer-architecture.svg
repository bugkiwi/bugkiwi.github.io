<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">OtterVoice 三层架构与职责边界</title>
  <desc id="desc">示例层只组合策略与界面；会话内核拥有轮次、状态、取消和事件；平台运行时拥有麦克风、媒体容器和播放；Provider 拥有模型协议、流式解析和用量。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/></filter>
    <style>
      .title{font:700 42px 'Arial Unicode MS',sans-serif;fill:#0f172a}.sub{font:400 22px 'Arial Unicode MS',sans-serif;fill:#475569}
      .h{font:700 28px 'Arial Unicode MS',sans-serif;fill:#0f172a}.p{font:400 21px 'Arial Unicode MS',sans-serif;fill:#334155}
      .small{font:400 18px 'Arial Unicode MS',sans-serif;fill:#475569}.label{font:700 18px 'Arial Unicode MS',sans-serif;fill:#fff}
      .edge{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="980" fill="#f8fafc"/>
  <text x="80" y="76" class="title">OtterVoice：三层架构与故障边界</text>
  <text x="80" y="112" class="sub">Example 组合体验；Core、Runtime、Provider 各自拥有不可替代的知识</text>

  <rect x="280" y="158" width="1040" height="148" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="314" y="188" width="142" height="40" rx="20" fill="#0f172a"/><text x="385" y="215" text-anchor="middle" class="label">Example 层</text>
  <text x="494" y="213" class="h">Web Demo · Expo Demo · 文档站</text>
  <text x="494" y="252" class="p">负责阈值、提示词、消息布局、语言与产品策略</text>
  <text x="494" y="281" class="small">不解析 WebM，不决定 turn 何时结算，也不直接保存 Provider 密钥</text>

  <path d="M800 306 L800 363" class="edge"/>
  <text x="828" y="345" class="small">调用统一会话 API</text>

  <rect x="566" y="390" width="468" height="318" rx="30" fill="#eff6ff" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <rect x="604" y="424" width="154" height="40" rx="20" fill="#2563eb"/><text x="681" y="451" text-anchor="middle" class="label">会话内核</text>
  <text x="604" y="510" class="h">VoiceSession</text>
  <text x="604" y="553" class="p">• turnId 与 transcript</text>
  <text x="604" y="593" class="p">• 状态迁移与 processing</text>
  <text x="604" y="633" class="p">• generation、取消与事件</text>
  <text x="604" y="673" class="p">• partial / final 的语义</text>

  <rect x="76" y="430" width="392" height="278" rx="28" fill="#ecfdf5" stroke="#0f766e" stroke-width="3" filter="url(#shadow)"/>
  <rect x="110" y="464" width="168" height="40" rx="20" fill="#0f766e"/><text x="194" y="491" text-anchor="middle" class="label">平台运行时</text>
  <text x="110" y="548" class="h">Web · Expo · Node</text>
  <text x="110" y="591" class="p">麦克风、权限、录音时序</text>
  <text x="110" y="631" class="p">WebM / PCM / WAV 容器</text>
  <text x="110" y="671" class="p">播放队列、暂停与恢复</text>

  <rect x="1132" y="430" width="392" height="278" rx="28" fill="#fff7ed" stroke="#c2410c" stroke-width="3" filter="url(#shadow)"/>
  <rect x="1166" y="464" width="154" height="40" rx="20" fill="#c2410c"/><text x="1243" y="491" text-anchor="middle" class="label">Provider</text>
  <text x="1166" y="548" class="h">ASR · LLM · TTS</text>
  <text x="1166" y="591" class="p">HTTP / SSE / WebSocket</text>
  <text x="1166" y="631" class="p">模型能力与输入输出格式</text>
  <text x="1166" y="671" class="p">分片解析、错误与用量</text>

  <path d="M468 560 L544 560" class="edge"/>
  <path d="M1132 560 L1056 560" class="edge"/>
  <text x="486" y="531" class="small">音频 / 音量</text>
  <text x="1016" y="531" text-anchor="end" class="small">结果 / 分片</text>

  <rect x="76" y="772" width="1448" height="136" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="112" y="820" class="h">定位原则</text>
  <text x="112" y="861" class="p">重复回答、旧轮次复活 → Core　　首字丢失、无法解码 → Runtime　　SSE 拼接、模型能力异常 → Provider</text>
  <text x="112" y="894" class="small">当修复需要越过边界时，先检查契约是否缺失，而不是把补丁留在 example。</text>
</svg>
